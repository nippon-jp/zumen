<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Builder v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; overflow: hidden; }
        canvas { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; cursor: crosshair; }
        .active-floor { background-color: #4f46e5 !important; color: white !important; }
        .tool-btn { transition: all 0.2s; }
        .tool-btn:hover { background-color: #eef2ff; border-color: #6366f1; }
        #setup-overlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col h-screen text-slate-800">

    <!-- 初回階数設定オーバーレイ -->
    <div id="setup-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center">
            <h2 class="text-2xl font-bold mb-2">Build Your Home</h2>
            <p class="text-slate-500 mb-6 text-sm">作成する建物の階数を選択してください</p>
            <div class="grid grid-cols-3 gap-4 mb-8">
                <button onclick="initApp(1)" class="p-4 border-2 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition font-bold">1階建</button>
                <button onclick="initApp(2)" class="p-4 border-2 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition font-bold">2階建</button>
                <button onclick="initApp(3)" class="p-4 border-2 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition font-bold">3階建</button>
            </div>
        </div>
    </div>

    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center z-10 shadow-sm">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-black text-indigo-600">HOME BUILDER <span class="text-xs text-slate-400 font-normal">v3.0</span></h1>
            <div id="floor-tabs" class="flex bg-slate-100 p-1 rounded-xl"></div>
        </div>
        <div class="flex gap-2">
            <button onclick="undo()" class="px-3 py-2 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
            </button>
            <button onclick="saveProject()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition">保存</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- サイドパネル -->
        <aside class="w-80 bg-white border-r border-slate-200 p-6 flex flex-col gap-8 overflow-y-auto shadow-inner">
            <!-- 部屋追加（レゴ方式） -->
            <section>
                <h3 class="text-[10px] font-bold text-slate-400 mb-4 uppercase tracking-widest">部屋を追加</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="addRoom(200, 200, 'Living')" class="tool-btn border p-3 rounded-xl flex flex-col items-center gap-1 text-xs font-bold">
                        <div class="w-8 h-8 bg-blue-100 border-2 border-blue-400 rounded"></div>6畳相当
                    </button>
                    <button onclick="addRoom(150, 150, 'Kitchen')" class="tool-btn border p-3 rounded-xl flex flex-col items-center gap-1 text-xs font-bold">
                        <div class="w-6 h-6 bg-orange-100 border-2 border-orange-400 rounded"></div>DK
                    </button>
                </div>
            </section>

            <!-- 設備追加 -->
            <section>
                <h3 class="text-[10px] font-bold text-slate-400 mb-4 uppercase tracking-widest">水回り・設備</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div draggable="true" ondragstart="drag(event, 'bath')" class="cursor-grab border p-3 rounded-xl flex items-center gap-3 hover:bg-slate-50 transition">
                        <div class="w-8 h-6 border-2 border-cyan-500 rounded-sm bg-cyan-50"></div>
                        <span class="text-xs font-bold">お風呂</span>
                    </div>
                    <div draggable="true" ondragstart="drag(event, 'toilet')" class="cursor-grab border p-3 rounded-xl flex items-center gap-3 hover:bg-slate-50 transition">
                        <div class="w-6 h-8 border-2 border-slate-400 rounded-full bg-white"></div>
                        <span class="text-xs font-bold">便器</span>
                    </div>
                </div>
            </section>

            <!-- 修正ツール -->
            <section>
                <h3 class="text-[10px] font-bold text-slate-400 mb-4 uppercase tracking-widest">編集モード</h3>
                <div class="flex gap-2">
                    <button id="tool-select" onclick="setTool('select')" class="flex-1 p-3 rounded-xl border-2 font-bold text-xs active-tool">移動・変形</button>
                    <button id="tool-wall" onclick="setTool('wall')" class="flex-1 p-3 rounded-xl border-2 font-bold text-xs">自由描画</button>
                </div>
            </section>
        </aside>

        <!-- メインキャンバス -->
        <main class="flex-1 relative flex justify-center items-center p-8 overflow-auto bg-slate-200">
            <div ondrop="drop(event)" ondragover="allowDrop(event)">
                <canvas id="mainCanvas" width="1000" height="800" class="shadow-2xl rounded-sm bg-white"></canvas>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const floorTabs = document.getElementById('floor-tabs');
        
        let project = {
            totalFloors: 1,
            currentFloor: 1,
            data: {}, // 階ごとのデータ {1: {rooms:[], items:[]}, 2:...}
            history: [] // Undo用
        };

        let appState = {
            currentTool: 'select',
            draggingObj: null,
            resizingObj: null,
            drawing: false,
            points: []
        };

        const snap = (v) => Math.round(v / 20) * 20;

        // --- アプリ初期化 ---
        function initApp(floors) {
            project.totalFloors = floors;
            for(let i=1; i<=floors; i++) {
                project.data[i] = { rooms: [], items: [], walls: [] };
                const btn = document.createElement('button');
                btn.className = `px-6 py-2 rounded-lg text-sm font-bold transition ${i===1?'active-floor':''}`;
                btn.innerText = `${i}F`;
                btn.id = `tab-f${i}`;
                btn.onclick = () => switchFloor(i);
                floorTabs.appendChild(btn);
            }
            document.getElementById('setup-overlay').style.display = 'none';
            saveHistory();
            render();
        }

        function switchFloor(floor) {
            document.querySelectorAll('#floor-tabs button').forEach(b => b.classList.remove('active-floor'));
            document.getElementById(`tab-f${floor}`).classList.add('active-floor');
            project.currentFloor = floor;
            render();
        }

        // --- 部屋追加（レゴ） ---
        function addRoom(w, h, name) {
            project.data[project.currentFloor].rooms.push({
                x: 100, y: 100, w: w, h: h, name: name
            });
            saveHistory();
            render();
        }

        // --- 描画ロジック ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const floor = project.data[project.currentFloor];

            // 部屋の描画
            floor.rooms.forEach((room, idx) => {
                ctx.fillStyle = '#f8fafc';
                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 8;
                ctx.strokeRect(room.x, room.y, room.w, room.h);
                ctx.fillRect(room.x, room.y, room.w, room.h);
                
                // リサイズハンドル
                if(appState.currentTool === 'select') {
                    ctx.fillStyle = '#4f46e5';
                    ctx.fillRect(room.x + room.w - 5, room.y + room.h - 5, 10, 10);
                }
            });

            // 設備（アイテム）の描画
            floor.items.forEach(item => {
                ctx.save();
                ctx.translate(item.x, item.y);
                if(item.type === 'bath') {
                    ctx.fillStyle = '#ecfeff'; ctx.strokeStyle = '#0891b2';
                    ctx.strokeRect(-25, -15, 50, 30); ctx.fillRect(-25, -15, 50, 30);
                } else if(item.type === 'toilet') {
                    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#64748b';
                    ctx.beginPath(); ctx.ellipse(0, 0, 15, 20, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }
                ctx.restore();
            });
        }

        // --- インタラクション ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const floor = project.data[project.currentFloor];

            // リサイズ判定
            floor.rooms.forEach((r, idx) => {
                if(Math.abs(mx - (r.x + r.w)) < 15 && Math.abs(my - (r.y + r.h)) < 15) {
                    appState.resizingObj = { idx };
                } else if(mx > r.x && mx < r.x + r.w && my > r.y && my < r.y + r.h) {
                    appState.draggingObj = { type: 'room', idx, offset: {x: mx-r.x, y: my-r.y} };
                }
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const floor = project.data[project.currentFloor];

            if(appState.resizingObj) {
                const r = floor.rooms[appState.resizingObj.idx];
                r.w = snap(mx - r.x);
                r.h = snap(my - r.y);
                render();
            } else if(appState.draggingObj) {
                const r = floor.rooms[appState.draggingObj.idx];
                r.x = snap(mx - appState.draggingObj.offset.x);
                r.y = snap(my - appState.draggingObj.offset.y);
                render();
            }
        });

        window.addEventListener('mouseup', () => {
            if(appState.draggingObj || appState.resizingObj) saveHistory();
            appState.draggingObj = null;
            appState.resizingObj = null;
        });

        // --- Undo機能 ---
        function saveHistory() {
            project.history.push(JSON.stringify(project.data));
            if(project.history.length > 20) project.history.shift();
        }

        function undo() {
            if(project.history.length > 1) {
                project.history.pop();
                project.data = JSON.parse(project.history[project.history.length - 1]);
                render();
            }
        }

        // --- ドラッグ＆ドロップ（設備） ---
        function allowDrop(e) { e.preventDefault(); }
        function drag(e, type) { e.dataTransfer.setData("type", type); }
        function drop(e) {
            e.preventDefault();
            const type = e.dataTransfer.getData("type");
            const rect = canvas.getBoundingClientRect();
            project.data[project.currentFloor].items.push({
                x: snap(e.clientX - rect.left),
                y: snap(e.clientY - rect.top),
                type: type
            });
            saveHistory();
            render();
        }

        function setTool(tool) {
            appState.currentTool = tool;
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('active-floor'));
            document.getElementById(`tool-${tool}`).classList.add('active-floor');
        }
    </script>
</body>
</html>
