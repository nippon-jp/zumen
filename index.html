<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Floor Planner V2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; cursor: default; }
        #canvas-container { position: relative; overflow: hidden; }
        canvas { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; touch-action: none; cursor: crosshair;}
        .furniture-item { cursor: grab; }
        .active-tool { border-color: #3b82f6; background-color: #eff6ff; color: #1d4ed8;}
    </style>
</head>
<body class="flex flex-col h-screen select-none text-slate-900">

    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center shadow-sm z-10">
        <div class="flex items-center gap-3">
            <span class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md">S</span>
            <h1 class="text-xl font-extrabold tracking-tight">Smart <span class="font-normal text-slate-500">Floor Planner <span class="text-xs bg-slate-100 px-2 py-1 rounded">V2.0</span></span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="saveToLocal()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-xl text-white text-sm transition font-semibold shadow">保存</button>
            <button onclick="clearAll()" class="bg-slate-100 hover:bg-slate-200 px-5 py-2.5 rounded-xl text-slate-700 text-sm transition">リセット</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- サイドツールバー -->
        <aside class="w-72 bg-white border-r border-slate-200 p-6 flex flex-col gap-8 shadow-inner z-10">
            <div>
                <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">ツール</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button id="tool-wall" onclick="setTool('wall')" class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-600 transition hover:border-blue-200 hover:bg-blue-50 active-tool">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
                        <span class="text-xs font-semibold">壁を描く</span>
                    </button>
                    <button id="tool-select" onclick="setTool('select')" class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-600 transition hover:border-blue-200 hover:bg-blue-50">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 7l-2.99 2.99a3 3 0 000 4.24l8.49 8.49a3 3 0 004.24 0l8.49-8.49a3 3 0 000-4.24L21 7M7 7l8.49 8.49M7 7l8.48-8.48a3 3 0 014.24 0l8.48 8.48M7 7H3"></path></svg>
                        <span class="text-xs font-semibold">選択・移動</span>
                    </button>
                </div>
            </div>

            <div>
                <h3 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">家具パーツ (Drag & Drop)</h3>
                <div class="grid grid-cols-1 gap-3">
                    <div draggable="true" ondragstart="drag(event, 'sofa')" class="furniture-item border border-slate-200 p-4 rounded-xl flex items-center gap-4 hover:bg-slate-50 hover:border-slate-300">
                        <div class="w-14 h-8 border-2 border-slate-600 rounded-sm relative bg-slate-50 flex items-center justify-center">
                            <div class="absolute -top-1.5 w-10 h-3 bg-slate-600 rounded-sm"></div>
                        </div>
                        <span class="text-xs font-semibold text-slate-700">ソファ (3人掛け)</span>
                    </div>
                    <div draggable="true" ondragstart="drag(event, 'table')" class="furniture-item border border-slate-200 p-4 rounded-xl flex items-center gap-4 hover:bg-slate-50 hover:border-slate-300">
                        <div class="w-12 h-12 border-2 border-amber-800 rounded-full bg-amber-50 shadow-inner"></div>
                        <span class="text-xs font-semibold text-slate-700">円形テーブル</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-auto bg-slate-800 text-white p-5 rounded-2xl shadow-xl">
                <p class="text-[10px] text-slate-400 mb-1 uppercase font-extrabold tracking-widest">現在の面積</p>
                <p id="area-display" class="text-3xl font-extrabold text-blue-300">0.00 <span class="text-sm font-medium text-slate-500 ml-1">㎡</span></p>
            </div>
        </aside>

        <!-- メインコンテンツ -->
        <main class="flex-1 relative bg-slate-100 p-8 flex justify-center items-center">
            <div id="canvas-container" ondrop="drop(event)" ondragover="allowDrop(event)">
                <canvas id="floorPlanCanvas" width="900" height="700" class="shadow-2xl rounded-sm border border-slate-200 bg-white"></canvas>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('floorPlanCanvas');
        const ctx = canvas.getContext('2d');
        const areaDisplay = document.getElementById('area-display');

        // アプリの状態
        let appState = {
            points: [], 
            furniture: [],
            currentTool: 'wall', // 'wall', 'select'
            drawing: false,
            tempPoint: null,
            selectedObject: null, // type: 'point'|'furniture', index: idx, dragging: bool, rotating: bool
        };

        const snapSize = 20;
        const hitRadius = 15; // オブジェクト選択の当たり判定範囲
        const pixelToMeter = 100; // 100px = 1m とする

        // --- 初期化 ---
        window.addEventListener('DOMContentLoaded', () => {
            loadFromLocal();
            setTool('wall'); // デフォルトは壁描き
        });

        // --- ユーティリティ ---
        const snap = (pos) => Math.round(pos / snapSize) * snapSize;
        const getMousePos = (e) => {
            const rect = canvas.getBoundingClientRect();
            return { x: snap(e.clientX - rect.left), y: snap(e.clientY - rect.top) };
        };
        const getDist = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));

        // --- ツール選択 ---
        function setTool(tool) {
            appState.currentTool = tool;
            appState.selectedObject = null;
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('active-tool'));
            document.getElementById(`tool-${tool}`).classList.add('active-tool');
            if(tool === 'select') canvas.style.cursor = 'default';
            else canvas.style.cursor = 'crosshair';
            render();
        }

        // --- マウスイベント処理 ---
        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);

            // 【選択ツール】オブジェクト選択
            if (appState.currentTool === 'select') {
                // 1. 家具の回転ハンドル判定
                if (appState.selectedObject?.type === 'furniture') {
                    const f = appState.furniture[appState.selectedObject.index];
                    const rotHandle = {
                        x: f.x + Math.sin(f.rotation) * 45,
                        y: f.y - Math.cos(f.rotation) * 45
                    };
                    if (getDist(pos, rotHandle) < hitRadius) {
                        appState.selectedObject.rotating = true;
                        return;
                    }
                }
                
                // 2. 家具本体判定
                for (let i = appState.furniture.length - 1; i >= 0; i--) {
                    if (getDist(pos, appState.furniture[i]) < 30) {
                        appState.selectedObject = { type: 'furniture', index: i, dragging: true, offset: { x: pos.x - appState.furniture[i].x, y: pos.y - appState.furniture[i].y } };
                        render();
                        return;
                    }
                }

                // 3. 壁の頂点判定
                for (let i = 0; i < appState.points.length; i++) {
                    if (getDist(pos, appState.points[i]) < hitRadius) {
                        appState.selectedObject = { type: 'point', index: i, dragging: true };
                        render();
                        return;
                    }
                }

                // 何も選択しなかった場合
                appState.selectedObject = null;
                render();
            }

            // 【壁描きツール】頂点追加
            if (appState.currentTool === 'wall') {
                appState.drawing = true;
                appState.points.push(pos);
                render();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);

            // 【選択ツール】移動・回転
            if (appState.currentTool === 'select' && appState.selectedObject) {
                const sel = appState.selectedObject;
                
                if (sel.dragging) {
                    if (sel.type === 'point') appState.points[sel.index] = pos;
                    if (sel.type === 'furniture') {
                        appState.furniture[sel.index].x = pos.x - sel.offset.x;
                        appState.furniture[sel.index].y = pos.y - sel.offset.y;
                    }
                } else if (sel.rotating) {
                    const f = appState.furniture[sel.index];
                    f.rotation = Math.atan2(pos.y - f.y, pos.x - f.x) + Math.PI / 2;
                }
                render();
                calculateArea();
            }

            // 【壁描きツール】プレビュー
            if (appState.currentTool === 'wall' && appState.drawing) {
                appState.tempPoint = pos;
                render();
            }
        });

        window.addEventListener('mouseup', () => {
            if (appState.drawing) appState.drawing = false;
            if (appState.selectedObject) {
                appState.selectedObject.dragging = false;
                appState.selectedObject.rotating = false;
            }
            appState.tempPoint = null;
            render();
            calculateArea();
        });

        // キーボードで選択オブジェクト削除 (Del/Backspace)
        window.addEventListener('keydown', (e) => {
            if (!appState.selectedObject) return;
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const sel = appState.selectedObject;
                if (sel.type === 'point') appState.points.splice(sel.index, 1);
                if (sel.type === 'furniture') appState.furniture.splice(sel.index, 1);
                appState.selectedObject = null;
                render();
                calculateArea();
            }
        });

        // --- ドラッグ＆ドロップ (家具) ---
        function allowDrop(e) { e.preventDefault(); }
        function drag(e, type) { e.dataTransfer.setData("type", type); }
        function drop(e) {
            e.preventDefault();
            const type = e.dataTransfer.getData("type");
            const rect = canvas.getBoundingClientRect();
            appState.furniture.push({
                x: snap(e.clientX - rect.left),
                y: snap(e.clientY - rect.top),
                type: type,
                rotation: 0 // ラジアン
            });
            render();
        }

        // --- 描画 (メイン) ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. 壁の描画 (ハッチング風)
            if (appState.points.length > 1) {
                // 壁の塗りつぶし (建築図面風)
                ctx.fillStyle = '#f1f5f9';
                ctx.beginPath();
                ctx.moveTo(appState.points[0].x, appState.points[0].y);
                appState.points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.fill();

                // 壁の輪郭
                ctx.lineWidth = 12;
                ctx.strokeStyle = '#334155';
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(appState.points[0].x, appState.points[0].y);
                appState.points.forEach(p => ctx.lineTo(p.x, p.y));
                if (appState.drawing && appState.tempPoint) {
                    ctx.lineTo(appState.tempPoint.x, appState.tempPoint.y);
                    // 寸法吹き出し
                    drawDimension(appState.points[appState.points.length-1], appState.tempPoint);
                }
                ctx.stroke();
            }

            // 2. 選択・移動ツール用 UI (頂点)
            if (appState.currentTool === 'select') {
                appState.points.forEach((p, i) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, hitRadius/2, 0, Math.PI * 2);
                    ctx.fillStyle = (appState.selectedObject?.type === 'point' && appState.selectedObject.index === i) ? '#3b82f6' : '#fff';
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.fill();
                    ctx.stroke();
                });
            }

            // 3. 家具の描画 (ベクター表現)
            appState.furniture.forEach((f, i) => {
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);
                
                // 選択状態の枠
                if (appState.selectedObject?.type === 'furniture' && appState.selectedObject.index === i) {
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(-35, -35, 70, 70);
                    ctx.setLineDash([]);
                    
                    // 回転ハンドル
                    ctx.beginPath();
                    ctx.arc(0, -45, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.stroke();
                    ctx.setLineDash([2, 2]);
                    ctx.beginPath(); ctx.moveTo(0, -35); ctx.lineTo(0, -45); ctx.stroke();
                    ctx.setLineDash([]);
                }

                // 家具本体の描画
                if (f.type === 'sofa') {
                    // ソファアイコン
                    ctx.fillStyle = '#94a3b8'; ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5;
                    drawRoundRect(-30, -20, 60, 40, 5, true); // 本体
                    drawRoundRect(-30, -20, 60, 10, 2, true); // 背もたれ
                    drawRoundRect(-30, -20, 10, 40, 2, true); // 肘掛けL
                    drawRoundRect(20, -20, 10, 40, 2, true); // 肘掛けR
                } else if (f.type === 'table') {
                    // 円形テーブル
                    ctx.fillStyle = '#e7e5e4'; ctx.strokeStyle = '#a8a29e'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    // 木目風の輪
                    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.strokeStyle = '#d6d3d1'; ctx.stroke();
                }
                
                ctx.restore();
            });
        }

        // --- 寸法表示 (吹き出し) ---
        function drawDimension(p1, p2) {
            const distPx = getDist(p1, p2);
            if (distPx < 10) return;
            const distM = (distPx / pixelToMeter).toFixed(2);
            
            const mid = { x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 };
            
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const txt = `${distPx}px (${distM}m)`;
            const width = ctx.measureText(txt).width + 12;
            drawRoundRect(mid.x - width/2, mid.y - 22, width, 18, 5, true);
            ctx.fillStyle = '#fff';
            ctx.fillText(txt, mid.x, mid.y - 12);
        }

        // --- 角丸四角形描画ユーティリティ ---
        function drawRoundRect(x, y, w, h, r, fill = false) {
            ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
            if (fill) ctx.fill(); ctx.stroke();
        }

        // --- 面積計算 ---
        function calculateArea() {
            if (appState.points.length < 3) return;
            let area = 0;
            for (let i = 0; i < appState.points.length; i++) {
                let j = (i + 1) % appState.points.length;
                area += appState.points[i].x * appState.points[j].y - appState.points[j].x * appState.points[i].y;
            }
            // px^2 -> m^2
            const realArea = Math.abs(area) / 2 / (pixelToMeter * pixelToMeter);
            areaDisplay.innerText = realArea.toFixed(2) + " ㎡";
        }

        // --- データ保存 (localStorage) ---
        function saveToLocal() {
            localStorage.setItem('savedFloorPlan_v2', JSON.stringify({ points: appState.points, furniture: appState.furniture.map(f => ({...f, img: null})) }));
            alert('保存しました');
        }
        function loadFromLocal() {
            const saved = localStorage.getItem('savedFloorPlan_v2');
            if (saved) {
                const data = JSON.parse(saved);
                appState.points = data.points || [];
                appState.furniture = data.furniture || [];
                render(); calculateArea();
            }
        }
        function clearAll() {
            if(confirm('リセットしますか？')) {
                appState.points = []; appState.furniture = []; appState.selectedObject = null;
                render(); areaDisplay.innerText = "0.00 ㎡";
            }
        }
    </script>
</body>
</html>
</html>
